version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: icanrun-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite+aiosqlite:///./data/icanrun.db
    volumes:
      - icanrun_db_data:/app/data
      - ./backend/.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: icanrun-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

# Note: Using SQLite for simplicity.
# For production with high concurrency, consider migrating to PostgreSQL.
# To add PostgreSQL, uncomment and configure a postgres service below,
# update DATABASE_URL to postgresql+asyncpg://...

volumes:
  icanrun_db_data:
