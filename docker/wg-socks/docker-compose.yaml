services:
  wg-socks:
    build: .
    # hostname registers in Docker DNS so other containers on the same
    # network can resolve it as "icanrun-wg-socks" — works even when
    # Coolify overrides container_name with its own UUID-based value.
    hostname: icanrun-wg-socks
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    environment:
      - WG_PRIVATE_KEY
      - WG_ADDRESS
      - WG_PEER_PUBLIC_KEY
      - WG_PRESHARED_KEY
      - WG_ENDPOINT
    restart: unless-stopped
    networks:
      coolify:
        aliases:
          - icanrun-wg-socks

networks:
  coolify:
    external: true
